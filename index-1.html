<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1A1714">
<title>ADHS- und Meno-Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EE; --white: #FFFFFF; --text: #1A1714;
    --muted: #888; --border: #EAE6E0;
  }

  html { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100%;
    padding: 1.25rem 0.85rem env(safe-area-inset-bottom, 1rem);
    padding-top: max(1.25rem, env(safe-area-inset-top));
  }

  .header { text-align: center; margin-bottom: 1.5rem; }
  .header .eyebrow { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
  .header h1 { font-family: 'Fraunces', Georgia, serif; font-weight: 300; font-size: clamp(1.2rem, 4.5vw, 1.8rem); line-height: 1.2; color: var(--text); }
  .header .sub { font-size: 0.78rem; color: var(--muted); font-weight: 300; margin-top: 0.4rem; }

  .tabs { display: flex; margin-bottom: 1.25rem; background: var(--white); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); max-width: 740px; margin-left: auto; margin-right: auto; }
  .tab { flex: 1; padding: 0.6rem 0.5rem; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.18s; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); background: #FAFAF8; }

  .date-bar { display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-bottom: 1.25rem; }
  .date-badge { background: var(--white); border: 1px solid var(--border); border-radius: 999px; padding: 0.3rem 0.9rem; font-size: 0.8rem; font-weight: 500; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .btn-save { background: var(--text); color: white; border: none; border-radius: 999px; padding: 0.38rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
  .btn-save:active { transform: scale(0.96); opacity: 0.8; }

  .summary-row { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; margin-bottom: 1.25rem; }
  .pill { display: flex; align-items: center; gap: 0.35rem; padding: 0.28rem 0.75rem; border-radius: 999px; font-size: 0.72rem; font-weight: 500; border: 2px solid transparent; cursor: pointer; transition: all 0.18s; background: var(--white); -webkit-tap-highlight-color: transparent; }
  .pill .cbadge { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 700; color: white; flex-shrink: 0; }

  .cards { display: flex; flex-direction: column; gap: 0.9rem; max-width: 740px; margin: 0 auto; }
  .card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: opacity 0.2s; }
  .card.dimmed { opacity: 0.4; }

  .card-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.9rem 1.1rem; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .card-icon { font-size: 1.35rem; flex-shrink: 0; }
  .card-title-block { flex: 1; min-width: 0; }
  .card-title { font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: 0.98rem; color: var(--text); }
  .card-desc { font-size: 0.72rem; color: var(--muted); font-weight: 300; margin-top: 0.12rem; line-height: 1.4; }
  .card-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.35rem; }
  .progress-bar { flex: 1; height: 3px; border-radius: 2px; background: #EEE; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.35s ease; }
  .progress-label { font-size: 0.68rem; font-weight: 500; white-space: nowrap; }
  .chevron { font-size: 0.85rem; transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }

  .symptom-list { border-top: 1px solid var(--border); }
  .symptom-row { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.6rem 1.1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; -webkit-tap-highlight-color: transparent; }
  .symptom-row:last-child { border-bottom: none; }
  .symptom-row:active { background: #F3F0EB; }
  .checkbox { width: 17px; height: 17px; border-radius: 4px; border: 2px solid #CCC; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .checkbox.checked { border-color: transparent; }
  .symptom-name { font-size: 0.85rem; font-weight: 500; line-height: 1.3; transition: color 0.15s; }
  .symptom-name.checked { text-decoration: line-through; opacity: 0.55; }
  .symptom-detail { font-size: 0.72rem; color: var(--muted); font-weight: 300; margin-top: 0.08rem; line-height: 1.35; }

  /* History */
  .history-wrap { max-width: 740px; margin: 0 auto; }
  .history-empty { text-align: center; color: var(--muted); font-size: 0.82rem; font-weight: 300; padding: 3rem 1rem; }
  .history-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .history-entry { background: var(--white); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden; }

  .history-top { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .history-top:active { background: #FAFAF8; }
  .history-date { font-size: 0.82rem; font-weight: 500; color: var(--text); }
  .history-actions { display: flex; align-items: center; gap: 0.4rem; }
  .history-total { font-size: 0.72rem; font-weight: 500; color: var(--muted); }
  .history-chevron { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; display: inline-block; }
  .history-chevron.open { transform: rotate(180deg); }
  .history-del { background: none; border: none; color: #CCC; cursor: pointer; font-size: 0.8rem; padding: 0.15rem 0.3rem; border-radius: 4px; line-height: 1; }
  .history-del:active { color: #E07B3F; }

  .history-bars { display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 0 1rem 0.75rem; }
  .h-bar-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; color: var(--muted); }
  .h-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .history-detail { border-top: 1px solid var(--border); padding: 0.8rem 1rem 0.9rem; display: none; }
  .history-detail.open { display: block; }
  .detail-cat { margin-bottom: 0.75rem; }
  .detail-cat:last-child { margin-bottom: 0; }
  .detail-cat-title { font-size: 0.73rem; font-weight: 600; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.3rem; }
  .detail-symptom { font-size: 0.72rem; color: #555; font-weight: 400; padding: 0.12rem 0 0.12rem 0.85rem; border-left: 2px solid; margin-bottom: 0.1rem; line-height: 1.35; }
  .detail-none { font-size: 0.7rem; color: #CCC; font-style: italic; padding-left: 0.85rem; }

  .toast { position: fixed; bottom: max(1.5rem, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: white; padding: 0.55rem 1.3rem; border-radius: 999px; font-size: 0.8rem; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .footer-note { text-align: center; font-size: 0.68rem; color: #CCC; font-weight: 300; margin-top: 2rem; padding: 0 1rem; }
</style>
</head>
<body>

<div class="header">
  <p class="eyebrow">Persönliches Symptom-Tracking</p>
  <h1>ADHS- und Meno-Tracker</h1>
  <p class="sub">Täglich ausfüllen und speichern.</p>
</div>

<div class="tabs">
  <button class="tab active" id="tabToday" onclick="switchTab('today')">Heute</button>
  <button class="tab" id="tabHistory" onclick="switchTab('history')">Verlauf</button>
</div>

<div id="viewToday">
  <div class="date-bar">
    <div class="date-badge" id="dateBadge"></div>
    <button class="btn-save" onclick="saveDay()">✓ Speichern</button>
  </div>
  <div class="summary-row" id="summaryRow"></div>
  <div class="cards" id="cardsContainer"></div>
</div>

<div id="viewHistory" style="display:none">
  <div class="history-wrap"><div id="historyContent"></div></div>
</div>

<p class="footer-note">Daten lokal gespeichert · Kein Server · Kein Konto</p>
<div class="toast" id="toast">Gespeichert ✓</div>

<script>
const CATEGORIES = [
  {
    id: "aufmerksamkeit", label: "Aufmerksamkeitsdefizit",
    color: "#4A90D9", light: "#E8F2FD", icon: "◎",
    desc: "Schwierigkeiten, die Aufmerksamkeit aufrechtzuerhalten, zu filtern oder gezielt zu lenken.",
    symptome: [
      { name: "Leichte Ablenkbarkeit", detail: "Äußere Reize unterbrechen sofort den Gedankenfluss" },
      { name: "Gedankenverloren / Tagträumen", detail: "Abschweifen in Gedanken, besonders bei Routine" },
      { name: "Vergesslichkeit im Alltag", detail: "Termine, Gegenstände, Aufgaben werden vergessen" },
      { name: "Schwierigkeiten beim Zuhören", detail: "Gesprächen zu folgen fühlt sich anstrengend an" },
      { name: "Hyperfokus", detail: "Unverhältnismäßig starke Konzentration auf Interessantes" },
      { name: "Aufgaben nicht zu Ende führen", detail: "Begonnenes bleibt liegen, Wechsel zur nächsten Sache" },
      { name: "Detailblindheit / Flüchtigkeitsfehler", detail: "Übersehen von Details trotz Bemühung" },
      { name: "Schwierigkeiten bei Planung & Organisation", detail: "Zeit & Schritte eines Vorhabens realistisch einschätzen" },
      { name: "Prokrastination", detail: "Aufschieben von Aufgaben, die mentale Energie erfordern" },
      { name: "Gedankenrasen (kognitiv)", detail: "Viele parallele Gedanken, schwer priorisierbar" },
      { name: "Wenig / keine Exekutivfunktionen", detail: "Planen, Initiieren und Umsetzen von Handlungen gelingt kaum" },
      { name: "Motorische Ungenauigkeit", detail: "Fein- oder Grobmotorik ist weniger präzise als beabsichtigt" },
    ]
  },
  {
    id: "impulsivitaet", label: "Impulsivität",
    color: "#E07B3F", light: "#FDF0E8", icon: "⚡",
    desc: "Handlungen oder Äußerungen ohne ausreichende Überlegung, Schwierigkeit mit dem Warten.",
    symptome: [
      { name: "Unterbrechen von Gesprächspartnern", detail: "Sätze anderer werden beendet oder überlappend begonnen" },
      { name: "Vorschnelle Entscheidungen", detail: "Kauf, Zusagen oder Handlungen ohne Abwägen der Folgen" },
      { name: "Schwierigkeiten beim Warten", detail: "Wartesituationen erzeugen starke innere Unruhe" },
      { name: "Risikofreudiges Verhalten", detail: "Handlungen mit hohem Reiz trotz möglicher Konsequenzen" },
      { name: "Dinge herausplatzen", detail: "Antworten oder Kommentare kommen, bevor die Frage fertig ist" },
      { name: "Impulsive Ausgaben", detail: "Spontankäufe ohne Budgetkontrolle" },
      { name: "Niedrige Frustrationstoleranz", detail: "Schnelle Reaktion auf Hindernisse, wenig Puffer" },
      { name: "Schwierigkeiten, Gedanken zurückzuhalten", detail: "Interne Zensur greift verzögert oder schwach" },
    ]
  },
  {
    id: "emotionen", label: "Emotionale Instabilität",
    color: "#9B5DE5", light: "#F2EAFF", icon: "∿",
    desc: "Schnell wechselnde, intensive Gefühlszustände, oft unverhältnismäßig zur Situation.",
    symptome: [
      { name: "Schnelle Stimmungswechsel", detail: "Emotionen wechseln innerhalb von Minuten bis Stunden" },
      { name: "Rejection Sensitive Dysphoria (RSD)", detail: "Extreme Schmerzreaktion auf (wahrgenommene) Ablehnung oder Kritik" },
      { name: "Leichte Reizbarkeit", detail: "Kleine Auslöser führen zu starker emotionaler Reaktion" },
      { name: "Intensive Begeisterungsfähigkeit", detail: "Überwältigende Freude oder Euphorie in positiven Momenten" },
      { name: "Emotionale Überflutung", detail: "Gefühle überwältigen so stark, dass Handeln kaum möglich ist" },
      { name: "Schwierigkeiten beim Beruhigen", detail: "Aufgewühlte Zustände klingen langsam ab, unabhängig vom Willen" },
      { name: "Scham- und Schuldgefühle", detail: "Intensive, wiederkehrende Selbstvorwürfe nach Fehlern" },
      { name: "Anhaltende innere Anspannung", detail: "Chronischer emotionaler Grundspannungszustand ohne konkreten Auslöser" },
    ]
  },
  {
    id: "hyperaktivitaet", label: "Hyperaktivität",
    color: "#2AAF74", light: "#E6F8F1", icon: "⟳",
    desc: "Übermäßiger Bewegungsdrang oder innere Getriebenheit, Schwierigkeiten mit Ruhe und Stillsein.",
    symptome: [
      { name: "Motorische Unruhe", detail: "Zappeln, Wippen, Herumlaufen – Körper kann nicht stillhalten" },
      { name: "Innere Anspannung / Getriebenheit", detail: "Gefühl, als ob ein Motor läuft, der sich nicht abschalten lässt" },
      { name: "Reden ohne Pause", detail: "Übermäßige Gesprächigkeit, Schwierigkeiten aufzuhören" },
      { name: "Schwierigkeiten beim Sitzen bleiben", detail: "Situationen, die Ruhe erfordern, fühlen sich quälend an" },
      { name: "Schlafprobleme / Einschlafschwierigkeiten", detail: "Körper und Geist kommen abends nicht zur Ruhe" },
      { name: "Ständiges Beschäftigtsein", detail: "Leerlauf wird als unangenehm empfunden, immer neue Aktivitäten gesucht" },
      { name: "Ungeduld in ruhigen Situationen", detail: "Kino, Wartezimmer, Meetings – Stillsitzen fühlt sich falsch an" },
      { name: "Impulsive Körperlichkeit", detail: "Berühren, Hantieren, Herumspielen mit Gegenständen" },
      { name: "Lärmpegel-Unempfindlichkeit", detail: "Eigene Lautstärke wird oft nicht wahrgenommen oder reguliert" },
      { name: "Stimmungsschwankungen durch Unterstimulation", detail: "Langeweile führt schnell zu Gereiztheit oder Stimmungseinbruch" },
    ]
  },
  {
    id: "meno", label: "Meno-Symptome",
    color: "#D94F7A", light: "#FDE8F0", icon: "☽",
    desc: "Hormonell bedingte Beschwerden im Zusammenhang mit dem Zyklus oder der Menopause.",
    symptome: [
      { name: "PMDS – Affektlabilität", detail: "Starke Stimmungsschwankungen in der Lutealphase" },
      { name: "Drang-Problematik", detail: "Verstärkter oder unkontrollierbarer Harndrang" },
      { name: "Körperschmerzen", detail: "Diffuse Schmerzen, Gelenkbeschwerden, Muskelziehen" },
      { name: "Unterleibskrämpfe", detail: "Krampfartige Schmerzen im Unterleib" },
    ]
  },
  {
    id: "autismus", label: "Autistische Züge",
    color: "#C07A2A", light: "#FDF3E3", icon: "⬡",
    desc: "Merkmale aus dem autistischen Spektrum, die den Alltag beeinflussen können.",
    symptome: [
      { name: "Zwangsgedanken", detail: "Wiederkehrende, aufdringliche Gedanken, die sich nicht abstellen lassen" },
      { name: "Zwangshandlungen", detail: "Rituale oder Wiederholungen, die Erleichterung verschaffen" },
      { name: "Tourette", detail: "Unwillkürliche Laut- oder Bewegungstics" },
      { name: "Shutdown / Breakdown", detail: "Vollständiger Rückzug oder emotionaler Zusammenbruch bei Überlastung" },
    ]
  },
  {
    id: "empfindsamkeit", label: "Empfindsamkeit",
    color: "#7A9E3B", light: "#EFF6E0", icon: "❋",
    desc: "Erhöhte Sensitivität gegenüber Sinnesreizen und sozialen Eindrücken.",
    symptome: [
      { name: "Umwelt generell", detail: "Reizüberflutung durch alltägliche Umgebungseindrücke" },
      { name: "Andere Menschen", detail: "Energieverlust oder Überwältigung durch soziale Interaktion" },
      { name: "Enge", detail: "Unwohlsein in engen Räumen, Menschenmengen oder Gedränge" },
      { name: "Gerüche", detail: "Starke Reaktion auf Gerüche, die andere kaum wahrnehmen" },
      { name: "Geräusche / Lärm", detail: "Akustische Reize werden als intensiv, störend oder schmerzhaft empfunden" },
    ]
  }
];

let openCards = new Set(CATEGORIES.map(c => c.id));
let checked = {};
let history = JSON.parse(localStorage.getItem('adhs_history') || '[]');
let openHistoryEntries = new Set();
let currentTab = 'today';

function todayStr() { return new Date().toISOString().slice(0, 10); }
function formatDate(str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: '2-digit' });
}
function countFor(catId) {
  return CATEGORIES.find(c => c.id === catId).symptome
    .filter(s => checked[`${catId}::${s.name}`]).length;
}

function init() {
  document.getElementById('dateBadge').textContent = formatDate(todayStr());
  const entry = history.find(e => e.date === todayStr());
  if (entry) checked = { ...entry.checked };
  renderToday();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('viewToday').style.display = tab === 'today' ? '' : 'none';
  document.getElementById('viewHistory').style.display = tab === 'history' ? '' : 'none';
  document.getElementById('tabToday').className = 'tab' + (tab === 'today' ? ' active' : '');
  document.getElementById('tabHistory').className = 'tab' + (tab === 'history' ? ' active' : '');
  if (tab === 'history') renderHistory();
}

function renderToday() { renderSummary(); renderCards(); }

function renderSummary() {
  const row = document.getElementById('summaryRow');
  row.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const cnt = countFor(cat.id);
    const isActive = openCards.has(cat.id);
    const pill = document.createElement('button');
    pill.className = 'pill';
    pill.style.color = cat.color;
    pill.style.borderColor = isActive ? cat.color : '#DDD';
    pill.style.background = isActive ? cat.light : 'white';
    pill.innerHTML = `<span>${cat.icon}</span>${cnt > 0 ? `<span class="cbadge" style="background:${cat.color}">${cnt}</span>` : ''}`;
    pill.title = cat.label;
    pill.onclick = () => {
      if (openCards.has(cat.id) && openCards.size > 1) openCards.delete(cat.id);
      else openCards.add(cat.id);
      renderToday();
    };
    row.appendChild(pill);
  });
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const isOpen = openCards.has(cat.id);
    const cnt = countFor(cat.id);
    const pct = Math.round((cnt / cat.symptome.length) * 100);
    const card = document.createElement('div');
    card.className = 'card' + (!isOpen && openCards.size < CATEGORIES.length ? ' dimmed' : '');
    const header = document.createElement('div');
    header.className = 'card-header';
    header.style.background = cat.light;
    header.innerHTML = `
      <span class="card-icon">${cat.icon}</span>
      <div class="card-title-block">
        <div class="card-title">${cat.label}</div>
        <div class="card-desc">${cat.desc}</div>
        <div class="card-meta">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${cat.color}"></div></div>
          <span class="progress-label" style="color:${cat.color}">${cnt}/${cat.symptome.length}</span>
        </div>
      </div>
      <span class="chevron ${isOpen ? 'open' : ''}" style="color:${cat.color}">▾</span>`;
    header.onclick = () => {
      if (isOpen && openCards.size > 1) openCards.delete(cat.id);
      else openCards.add(cat.id);
      renderToday();
    };
    card.appendChild(header);
    if (isOpen) {
      const list = document.createElement('div');
      list.className = 'symptom-list';
      cat.symptome.forEach(s => {
        const key = `${cat.id}::${s.name}`;
        const isChecked = !!checked[key];
        const row = document.createElement('div');
        row.className = 'symptom-row';
        row.innerHTML = `
          <div class="checkbox ${isChecked ? 'checked' : ''}" style="background:${isChecked ? cat.color : 'transparent'}">
            ${isChecked ? `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
          </div>
          <div>
            <div class="symptom-name ${isChecked ? 'checked' : ''}" style="color:${isChecked ? cat.color : 'var(--text)'}">${s.name}</div>
            <div class="symptom-detail">${s.detail}</div>
          </div>`;
        row.onclick = () => {
          checked[key] = !checked[key];
          if (!checked[key]) delete checked[key];
          renderToday();
        };
        list.appendChild(row);
      });
      card.appendChild(list);
    }
    container.appendChild(card);
  });
}

function saveDay() {
  const today = todayStr();
  const counts = {};
  CATEGORIES.forEach(cat => { counts[cat.id] = countFor(cat.id); });
  const entry = { date: today, checked: { ...checked }, counts };
  const idx = history.findIndex(e => e.date === today);
  if (idx >= 0) history[idx] = entry; else history.push(entry);
  localStorage.setItem('adhs_history', JSON.stringify(history));
  showToast();
}

function toggleHistoryEntry(date) {
  if (openHistoryEntries.has(date)) openHistoryEntries.delete(date);
  else openHistoryEntries.add(date);
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyContent');
  const sorted = [...history].sort((a, b) => b.date.localeCompare(a.date));
  if (sorted.length === 0) {
    el.innerHTML = '<div class="history-empty">Noch keine Einträge.<br>Fülle heute die Liste aus und tippe „Speichern".</div>';
    return;
  }
  el.innerHTML = '<div class="history-list" id="historyList"></div>';
  const list = document.getElementById('historyList');
  sorted.forEach(entry => {
    const total = Object.values(entry.counts).reduce((a, b) => a + b, 0);
    const isOpen = openHistoryEntries.has(entry.date);
    const bars = CATEGORIES.map(cat => {
      const cnt = entry.counts[cat.id] || 0;
      return `<span class="h-bar-item"><span class="h-dot" style="background:${cat.color}"></span><span>${cat.icon} ${cnt}</span></span>`;
    }).join('');
    const detailHtml = CATEGORIES.map(cat => {
      const hits = cat.symptome.filter(s => entry.checked && entry.checked[`${cat.id}::${s.name}`]);
      const items = hits.length > 0
        ? hits.map(s => `<div class="detail-symptom" style="border-color:${cat.color}">${s.name}</div>`).join('')
        : `<div class="detail-none">keine</div>`;
      return `<div class="detail-cat"><div class="detail-cat-title" style="color:${cat.color}">${cat.icon} ${cat.label}</div>${items}</div>`;
    }).join('');
    const div = document.createElement('div');
    div.className = 'history-entry';
    div.innerHTML = `
      <div class="history-top" onclick="toggleHistoryEntry('${entry.date}')">
        <span class="history-date">${formatDate(entry.date)}</span>
        <div class="history-actions">
          <span class="history-total">${total} gesamt</span>
          <span class="history-chevron ${isOpen ? 'open' : ''}">▾</span>
          <button class="history-del" onclick="event.stopPropagation();deleteEntry('${entry.date}')">✕</button>
        </div>
      </div>
      <div class="history-bars">${bars}</div>
      <div class="history-detail ${isOpen ? 'open' : ''}">${detailHtml}</div>`;
    list.appendChild(div);
  });
}

function deleteEntry(date) {
  history = history.filter(e => e.date !== date);
  openHistoryEntries.delete(date);
  localStorage.setItem('adhs_history', JSON.stringify(history));
  renderHistory();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
